<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 隨身助手 - 系統管理後台</title>
    <link rel="stylesheet" href="config.css">
</head>
<body>
    <div class="container">
        <!-- 頂部標題 -->
        <header>
            <div class="logo">🛠️ ERP 隨身助手 設定後台</div>
            <div class="subtitle">本機安全管理系統 (僅限本機電腦 localhost 存取)</div>
        </header>

        <!-- 設定區域 -->
        <main class="grid">
            <!-- 左側：系統基本設定與排程 -->
            <section class="card">
                <h2>📦 系統基本設定</h2>
                
                <div class="form-group">
                    <label for="databasePath">Visual FoxPro DBF 資料庫路徑</label>
                    <input type="text" id="databasePath" placeholder="例如: \\192.168.1.99\d\nmedi\stock.DBF">
                </div>

                <div class="form-group">
                    <label for="lowStockThreshold">日常低庫存警報水位 (目前數量以下觸發)</label>
                    <div class="slider-container">
                        <input type="range" id="lowStockThreshold" min="1" max="100" value="5">
                        <span id="lowStockValue" class="badge">5</span>
                    </div>
                </div>

                <h2>⏰ 每日缺貨定時推播排程</h2>
                <div class="push-schedule-section">
                    <div class="add-time-bar">
                        <input type="time" id="newPushTime">
                        <button type="button" class="btn btn-primary" onclick="addPushTime()">➕ 新增推播時間</button>
                    </div>
                    <div id="pushTimesList" class="badge-list">
                        <!-- 動態生成時間標籤 -->
                    </div>
                </div>
            </section>

            <!-- 右側：主力商品設定 (搜尋與管理) -->
            <section class="card">
                <h2>🔴 主力警報商品管理 (Priority Products)</h2>
                <p class="description">只有列在清單中的商品才會觸發日常低庫存提醒。其餘商品僅在剛好變為 0 (斷貨) 的瞬間觸發，防止訊息爆量。</p>
                
                <div class="search-bar">
                    <input type="text" id="productSearchInput" placeholder="搜尋商品名稱、編號或條碼 (例: 酒精)">
                    <button type="button" class="btn btn-secondary" onclick="searchProducts()">🔍 搜尋</button>
                </div>

                <div id="searchResults" class="search-results-list">
                    <!-- 搜尋結果 -->
                </div>

                <h3>目前列管的主力商品清單 (<span id="priorityCount">0</span> 筆)</h3>
                <div id="priorityProductsList" class="priority-list">
                    <!-- 列管商品 -->
                </div>
            </section>

            <!-- 底部/下方：動態機器人配置列表 -->
            <section class="card full-width">
                <div class="card-header-row">
                    <h2>🤖 機器人配置列表 (Bot Slots)</h2>
                    <button type="button" class="btn btn-primary" onclick="addBotSlot()">➕ 新增機器人</button>
                </div>
                <p class="description">您可以自訂多個機器人，並為每台機器人分配不同功能 (查價、盤點、庫存推播) 與授權對象。</p>
                
                <div id="botsContainer" class="bots-grid">
                    <!-- 動態生成機器人卡片 -->
                </div>
            </section>
        </main>

        <!-- 儲存浮動列 -->
        <footer>
            <div id="saveStatus" class="status-msg"></div>
            <button type="button" class="btn btn-large btn-success" onclick="saveConfiguration()">💾 儲存所有設定</button>
        </footer>
    </div>

    <script src="config.js"></script>
</body>
</html>
