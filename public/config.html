<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 隨身助手 - 系統管理後台</title>
    <link rel="stylesheet" href="config.css">
    <style>
        /* 額外補強的單欄垂直機器人 Slots 列表樣式 */
        .bots-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        /* 將表單輸入與提示的佈局稍微美化 */
        .form-group label {
            font-weight: 600;
            color: #fff;
        }
        .field-hint {
            color: var(--text-secondary);
            font-size: 0.82rem;
            margin-top: 0.5rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 頂部標題 -->
        <header>
            <div class="logo">🛠️ ERP 隨身助手 設定後台</div>
            <div class="subtitle">本機安全管理系統 (僅限本機電腦 localhost / 127.0.0.1 存取)</div>
        </header>

        <!-- 設定區域 (兩欄對稱佈局) -->
        <main class="grid">
            <!-- 左側：系統基本設定 -->
            <section class="card">
                <h2>📦 系統基本設定</h2>
                <p class="description">在此設定 ERP 的 VFP 資料庫 UNC 連接路徑。修改後將即時生效。</p>
                
                <div class="form-group">
                    <label for="databasePath">Visual FoxPro DBF 資料庫路徑 (ReadOnly)</label>
                    <input type="text" id="databasePath" placeholder="例如: \\192.168.1.99\d\nmedi\stock.DBF">
                    <div class="field-hint">
                        請輸入 ERP 資料庫伺服器的資料庫絕對路徑（UNC 共享路徑）。<br>
                        本機查詢機器人會使用唯讀方式安全讀取商品與歷史銷貨明細。
                    </div>
                </div>
            </section>

            <!-- 右側：機器人 Slot 配置列表 -->
            <section class="card">
                <div class="card-header-row">
                    <h2>🤖 機器人配置列表 (Bot Slots)</h2>
                    <button type="button" class="btn btn-primary" onclick="addBotSlot()">➕ 新增機器人</button>
                </div>
                <p class="description">您可以自訂多個 Telegram 機器人，並為每台機器人分配不同的功能與授權聊天室。</p>
                
                <div id="botsContainer" class="bots-list">
                    <!-- 動態生成機器人卡片 (垂直單欄排列) -->
                </div>
            </section>
        </main>

        <!-- 儲存浮動列 -->
        <footer>
            <div id="saveStatus" class="status-msg"></div>
            <button type="button" class="btn btn-large btn-success" onclick="saveConfiguration()">💾 儲存所有設定</button>
        </footer>
    </div>

    <script src="config.js"></script>
</body>
</html>
