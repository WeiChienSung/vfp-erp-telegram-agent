<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧庫存預測儀表板 | ERP 隨身查</title>
    <meta name="description" content="即時庫存預測儀表板，自動計算補貨優先順序，支援篩選、搜尋與 CSV 匯出。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/forecast.css">
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo-icon">📦</div>
                <div>
                    <h1 class="header-title">智慧庫存預測儀表板</h1>
                    <p class="header-sub" id="headerSub">正在載入資料...</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-refresh" id="btnRefresh" onclick="loadForecast()">
                    <span class="btn-icon">🔄</span> 重新整理
                </button>
                <button class="btn btn-export" id="btnExport" onclick="exportCSV()" disabled>
                    <span class="btn-icon">📥</span> 匯出 CSV
                </button>
            </div>
        </header>

        <!-- Stat Cards -->
        <div class="stat-cards">
            <div class="stat-card stat-urgent" id="cardUrgent" onclick="setFilter('urgent')">
                <div class="stat-icon">🔴</div>
                <div class="stat-info">
                    <div class="stat-num" id="numUrgent">—</div>
                    <div class="stat-label">緊急補貨</div>
                    <div class="stat-hint" id="hintUrgent">不足 7 工作天存量</div>
                </div>
            </div>
            <div class="stat-card stat-watch" id="cardWatch" onclick="setFilter('watch')">
                <div class="stat-icon">🟡</div>
                <div class="stat-info">
                    <div class="stat-num" id="numWatch">—</div>
                    <div class="stat-label">建議關注</div>
                    <div class="stat-hint">7~30 天存量</div>
                </div>
            </div>
            <div class="stat-card stat-healthy" id="cardHealthy" onclick="setFilter('healthy')">
                <div class="stat-icon">🟢</div>
                <div class="stat-info">
                    <div class="stat-num" id="numHealthy">—</div>
                    <div class="stat-label">庫存充裕</div>
                    <div class="stat-hint">&gt; 30 天存量</div>
                </div>
            </div>
            <div class="stat-card stat-total" id="cardAll" onclick="setFilter('all')">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <div class="stat-num" id="numTotal">—</div>
                    <div class="stat-label">活躍商品</div>
                    <div class="stat-hint">全部顯示</div>
                </div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input" placeholder="搜尋品名、品號..." oninput="applyFilters()">
                <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</button>
            </div>
            <div class="toggle-wrap">
                <label class="toggle-label">
                    <input type="checkbox" id="priorityOnly" onchange="applyFilters()">
                    <span class="toggle-text">⭐ 僅看主力商品</span>
                </label>
            </div>
        </div>

        <!-- Table -->
        <div class="table-container">
            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
                <p>正在計算 2 年銷售紀錄與低水位...</p>
            </div>
            <div class="empty-state" id="emptyState" style="display:none">
                <div class="empty-icon">🎉</div>
                <p>目前沒有符合條件的商品</p>
            </div>
            <table class="data-table" id="dataTable" style="display:none">
                <thead>
                    <tr>
                        <th class="col-status" onclick="sortBy('level')">狀態 <span class="sort-arrow" data-col="level">↕</span></th>
                        <th class="col-name" onclick="sortBy('name')">品名 <span class="sort-arrow" data-col="name">↕</span></th>
                        <th class="col-no">品號</th>
                        <th class="col-stock" onclick="sortBy('stock')">庫存 <span class="sort-arrow" data-col="stock">↕</span></th>
                        <th class="col-avg" onclick="sortBy('avgMonthly')">月均銷量 <span class="sort-arrow" data-col="avgMonthly">↕</span></th>
                        <th class="col-low">低水位</th>
                        <th class="col-days" onclick="sortBy('daysLeft')">預估剩餘天數 <span class="sort-arrow" data-col="daysLeft">↕</span></th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="footer" id="footerInfo"></div>
    </div>

    <script src="/forecast.js"></script>
</body>
</html>
