<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <title>行動盤點助手 - ERP 隨身查</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- HTML5 Qrcode Scanner CDN -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="app-container">
        <!-- 頂部導覽列 -->
        <header class="app-header">
            <div class="header-logo">
                <i data-lucide="package-check" class="logo-icon"></i>
                <div class="logo-text">
                    <h1>行動盤點助手</h1>
                    <span class="sub-logo">ERP 隨身查 Module</span>
                </div>
            </div>
            <div class="connection-badge online" id="connection-status">
                <span class="dot"></span>
                <span class="status-text">連線正常</span>
            </div>
        </header>

        <!-- 主體內容 -->
        <main class="app-main">
            <!-- 步驟一：選擇盤點廠商 -->
            <section id="supplier-select-section" class="card fade-in">
                <div class="card-header">
                    <i data-lucide="store" class="header-icon"></i>
                    <h2>選擇盤點廠商</h2>
                </div>
                <div class="card-body">
                    <p class="section-desc">請輸入關鍵字快速搜尋或點擊選擇盤點廠商：</p>
                    <div class="search-select-wrapper">
                        <div class="search-box-wrapper">
                            <i data-lucide="search" class="search-icon"></i>
                            <input type="text" id="supplier-search-input" placeholder="🔍 輸入關鍵字搜尋廠商..." class="form-input" autocomplete="off">
                            <button id="btn-clear-supplier-search" class="clear-search-btn hidden" type="button">
                                <i data-lucide="x" class="clear-icon"></i>
                            </button>
                        </div>
                        <div class="dropdown-list-container">
                            <ul id="supplier-dropdown-list" class="supplier-dropdown-list hidden">
                                <li class="dropdown-placeholder">載入中，請稍候...</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 步驟二：盤點工作區 (選完廠商後顯示) -->
            <section id="workspace-section" class="workspace hidden fade-in">
                <!-- 掃描與搜尋控制面板 -->
                <div class="control-panel">
                    <button id="btn-toggle-scanner" class="btn btn-primary btn-scanner">
                        <i data-lucide="aperture" class="btn-icon"></i>
                        <span>啟動條碼掃描</span>
                    </button>
                    
                    <div class="search-box-wrapper">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="text" id="search-input" placeholder="搜尋品名、代號或條碼..." class="form-input" autocomplete="off">
                        <button id="btn-clear-search" class="clear-search-btn hidden">
                            <i data-lucide="x" class="clear-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- 條碼掃描區域 -->
                <div id="scanner-container" class="scanner-card hidden card">
                    <div class="scanner-header">
                        <h3>條碼相機掃描中</h3>
                        <button id="btn-close-scanner" class="btn-close">
                            <i data-lucide="x"></i>
                        </button>
                    </div>
                    <div class="scanner-body">
                        <div id="reader"></div>
                        <div class="scanner-tip">請將商品條碼置於相機框中央</div>
                    </div>
                </div>

                <!-- 盤點商品清單 -->
                <div class="checklist-card card">
                    <div class="checklist-header">
                        <div class="header-left">
                            <i data-lucide="clipboard-list" class="header-icon"></i>
                            <h2 id="checklist-title">商品明細對照表</h2>
                        </div>
                        <span class="badge" id="scanned-count-badge">已盤點: 0 筆</span>
                    </div>
                    
                    <div class="checklist-body">
                        <div id="checklist-loading" class="list-placeholder">
                            <div class="spinner"></div>
                            <p>載入商品清單中...</p>
                        </div>
                        <div id="checklist-empty" class="list-placeholder hidden">
                            <i data-lucide="inbox" class="placeholder-icon"></i>
                            <p>此廠商目前無登記商品</p>
                        </div>
                        <div id="checklist-no-results" class="list-placeholder hidden">
                            <i data-lucide="search-code" class="placeholder-icon"></i>
                            <p>找不到符合關鍵字的商品</p>
                        </div>
                        
                        <!-- 核心清單容器 -->
                        <ul id="product-list" class="product-list">
                            <!-- JS 動態生成項目 -->
                        </ul>
                    </div>
                </div>
            </section>
        </main>

        <!-- 底部浮動操作列 -->
        <footer id="app-footer" class="app-footer hidden fade-in">
            <div class="footer-summary">
                <span class="summary-text">本期草稿計：<strong id="draft-count">0</strong> 筆</span>
            </div>
            <div class="footer-actions">
                <button id="btn-clear-draft" class="btn btn-outline btn-danger">
                    <i data-lucide="trash-2" class="btn-icon"></i>
                    <span>清除</span>
                </button>
                <button id="btn-upload-take" class="btn btn-success btn-upload">
                    <i data-lucide="cloud-lightning" class="btn-icon"></i>
                    <span>送出上傳 ERP</span>
                </button>
            </div>
        </footer>
    </div>

    <!-- 盤點數量輸入對話視窗 (Modal) -->
    <div id="quantity-modal" class="modal-backdrop hidden">
        <div class="modal-card scale-up">
            <div class="modal-header">
                <h3 id="modal-product-name">佳合-外科弱彎角針 3 S.E.</h3>
                <span id="modal-product-code" class="code-badge">L301-11</span>
            </div>
            <div class="modal-body">
                <div class="product-meta-grid">
                    <div class="meta-item">
                        <span class="meta-label">儲位:</span>
                        <strong id="modal-shelf-location" class="meta-value">RC</strong>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">帳面庫存:</span>
                        <strong id="modal-system-stock" class="meta-value text-indigo">12 包</strong>
                    </div>
                    <div class="meta-item hidden" id="modal-scale-wrapper">
                        <span class="meta-label">包裝換算:</span>
                        <span id="modal-product-scale" class="meta-value">1箱 = 12包</span>
                    </div>
                </div>

                <!-- 數量輸入區 -->
                <div class="quantity-input-section">
                    <!-- 單單位或主單位輸入 -->
                    <div class="input-group" id="primary-input-group">
                        <label for="input-qty-primary" id="label-qty-primary">盤點數量 (瓶):</label>
                        <div class="number-input-wrapper">
                            <button class="num-btn btn-minus" type="button" data-target="input-qty-primary">
                                <i data-lucide="minus"></i>
                            </button>
                            <input type="number" id="input-qty-primary" class="qty-field" min="0" placeholder="0" step="any">
                            <button class="num-btn btn-plus" type="button" data-target="input-qty-primary">
                                <i data-lucide="plus"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 次單位輸入 (若有雙單位且換算倍數 > 1 時顯示) -->
                    <div class="input-group hidden" id="secondary-input-group">
                        <label for="input-qty-secondary" id="label-qty-secondary">盤點數量 (次單位):</label>
                        <div class="number-input-wrapper">
                            <button class="num-btn btn-minus" type="button" data-target="input-qty-secondary">
                                <i data-lucide="minus"></i>
                            </button>
                            <input type="number" id="input-qty-secondary" class="qty-field" min="0" placeholder="0">
                            <button class="num-btn btn-plus" type="button" data-target="input-qty-secondary">
                                <i data-lucide="plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- ⚠️ 重複掃描警示橫幅 -->
            <div id="duplicateScanWarning" class="hidden" style="background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:8px 12px;margin:0 16px 8px;font-size:0.85rem;color:#856404;font-weight:500;"></div>
            <div class="modal-footer">
                <button id="btn-cancel-qty" class="btn btn-outline">取消</button>
                <button id="btn-confirm-qty" class="btn btn-primary">確認加入</button>
            </div>
        </div>
    </div>

    <!-- 強制加入非廠商商品對話視窗 (Force Add Modal) -->
    <div id="force-add-modal" class="modal-backdrop hidden">
        <div class="modal-card scale-up">
            <div class="modal-header">
                <h3>強制加入商品</h3>
                <button id="btn-close-force" class="btn-close">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body">
                <p class="section-desc">此商品不屬於當前廠商，或無登記廠商。您可以搜尋並強制拉入本次盤點：</p>
                <div class="search-box-wrapper">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="force-search-input" placeholder="輸入商品名稱、編號或條碼..." class="form-input">
                </div>
                
                <div class="force-results-wrapper">
                    <div id="force-loading" class="list-placeholder hidden">
                        <div class="spinner"></div>
                    </div>
                    <ul id="force-search-results" class="force-results-list">
                        <!-- 搜尋結果項目 -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
